name: Apply resilient basemap loading

on:
  push:
    branches:
      - fix/arcgis-basemap-loading
    paths:
      - ".github/workflows/apply-basemap-resilience-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v5
        with:
          ref: fix/arcgis-basemap-loading

      - name: Patch the map screen
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("mobile/app/(tabs)/index.tsx")
          text = path.read_text()

          replacements = [
              (
                  'import { useWeatherLayers } from "../../src/hooks/use-weather-layers";\n',
                  'import { useBasemapStyle } from "../../src/hooks/use-basemap-style";\nimport { useWeatherLayers } from "../../src/hooks/use-weather-layers";\n',
              ),
              (
                  '  const baseMap = BASE_MAPS[baseMapId];\n',
                  '  const baseMap = BASE_MAPS[baseMapId];\n  const {\n    mapStyle: resolvedMapStyle,\n    loading: isBasemapLoading,\n    usingFallback: isUsingFallbackMap,\n    error: basemapError,\n    handleNativeFailure,\n  } = useBasemapStyle(baseMap.style, ARCGIS_BASEMAPS_CONFIGURED);\n',
              ),
              (
                  'disabled={isRefreshing || isWindLoading || isCloudLoading}',
                  'disabled={isRefreshing || isWindLoading || isCloudLoading || isBasemapLoading}',
              ),
              (
                  '{isRefreshing || isWindLoading || isCloudLoading ? (',
                  '{isRefreshing || isWindLoading || isCloudLoading || isBasemapLoading ? (',
              ),
              (
                  '''      {!ARCGIS_BASEMAPS_CONFIGURED ? (\n        <Text style={[styles.configurationNotice, { color: theme.warning }]}>\n          Basemap professionali non ancora configurate: la build di sviluppo usa la mappa di riserva.\n        </Text>\n      ) : null}\n''',
                  '''      {basemapError ? (\n        <Text style={[styles.configurationNotice, { color: theme.warning }]}>\n          {basemapError}\n        </Text>\n      ) : isUsingFallbackMap ? (\n        <Text style={[styles.configurationNotice, { color: theme.warning }]}>\n          Mappa OpenFreeMap attiva come riserva.\n        </Text>\n      ) : null}\n''',
              ),
              ('          key={baseMapId}\n', '          key={`${baseMapId}-${isUsingFallbackMap ? "fallback" : "arcgis"}`}\n'),
              ('          mapStyle={baseMap.style}\n', '          mapStyle={resolvedMapStyle}\n'),
              (
                  '          onRegionDidChange={(event) => scheduleWindRefresh(event.nativeEvent.bounds)}\n',
                  '          onDidFailLoadingMap={handleNativeFailure}\n          onRegionDidChange={(event) => scheduleWindRefresh(event.nativeEvent.bounds)}\n',
              ),
              ('        {isLoading ? (\n', '        {isLoading || isBasemapLoading ? (\n'),
              (
                  '{ARCGIS_BASEMAPS_CONFIGURED ? baseMap.attribution : FALLBACK_MAP_ATTRIBUTION}',
                  '{isUsingFallbackMap ? FALLBACK_MAP_ATTRIBUTION : baseMap.attribution}',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Expected source fragment not found: {old[:90]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install locked dependencies
        working-directory: mobile
        run: npm ci --include=dev --no-audit --no-fund

      - name: Verify mobile project
        working-directory: mobile
        run: |
          npm run typecheck
          npx expo install --check
          npm run doctor
          npx expo config --type public
          npx expo export --platform ios --output-dir dist-basemap-fix

      - name: Commit the map fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'mobile/app/(tabs)/index.tsx'
          git commit -m "Handle ArcGIS failures without a blank map"
          git push origin HEAD:fix/arcgis-basemap-loading

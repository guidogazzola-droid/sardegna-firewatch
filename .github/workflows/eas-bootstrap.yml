name: Bootstrap EAS project

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: eas-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Create and link the Expo EAS project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Require the Expo token
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::The repository secret EXPO_TOKEN is missing. Create a personal access token at expo.dev/settings/access-tokens and save it in GitHub Actions secrets as EXPO_TOKEN."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Verify Expo account
        shell: bash
        run: |
          identity="$(eas whoami | head -n 1 | tr -d '\r')"
          account="$(printf '%s\n' "$identity" | sed 's/ (authenticated using EXPO_TOKEN)$//')"
          normalized="$(printf '%s' "$account" | tr '[:upper:]' '[:lower:]')"
          echo "Authenticated with Expo as: $account"
          if [ "$normalized" != "camerun" ]; then
            echo "::error::EXPO_TOKEN belongs to '$account', but this app is configured for Expo owner 'Camerun'."
            exit 1
          fi

      - name: Read an existing EAS project ID
        id: current
        shell: bash
        run: |
          project_id="$(node - <<'NODE'
          const fs = require('node:fs');
          const text = fs.readFileSync('eas-project.ts', 'utf8');
          const match = text.match(/[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i);
          process.stdout.write(match?.[0] ?? '');
          NODE
          )"
          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"
          if [ -n "$project_id" ]; then
            echo "EAS project already configured: $project_id"
          fi

      - name: Create or find the EAS project
        id: initialize
        if: steps.current.outputs.project_id == ''
        shell: bash
        run: |
          set +e
          eas project:init --non-interactive --force 2>&1 | tee eas-init.log
          init_status=${PIPESTATUS[0]}
          set -e

          project_id="$(node - <<'NODE'
          const fs = require('node:fs');
          const text = fs
            .readFileSync('eas-init.log', 'utf8')
            .replace(/\u001B\[[0-?]*[ -/]*[@-~]/g, '');
          const explicit = text.match(/projectId["']?\s*:\s*["']([0-9a-f-]{36})["']/i);
          const fallback = text.match(/[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i);
          process.stdout.write(explicit?.[1] ?? fallback?.[0] ?? '');
          NODE
          )"

          if [ -z "$project_id" ]; then
            echo "::error::EAS project initialization did not return a project ID (exit status: $init_status)."
            exit 1
          fi

          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"
          echo "EAS project created or found: $project_id"

      - name: Save the EAS project ID locally
        env:
          PROJECT_ID: ${{ steps.current.outputs.project_id || steps.initialize.outputs.project_id }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const projectId = process.env.PROJECT_ID;
          if (!projectId) throw new Error('PROJECT_ID is missing.');
          fs.writeFileSync(
            'eas-project.ts',
            [
              '// Generated by the manual EAS bootstrap workflow.',
              '// This identifier is public project metadata, not a secret.',
              `export const EAS_PROJECT_ID = "${projectId}";`,
              '',
            ].join('\n'),
          );
          NODE

      - name: Verify the EAS linkage and Expo configuration
        env:
          PROJECT_ID: ${{ steps.current.outputs.project_id || steps.initialize.outputs.project_id }}
        shell: bash
        run: |
          eas project:init --id "$PROJECT_ID" --force --non-interactive
          eas project:info
          npx expo config --type public --json > expo-config.json
          node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('expo-config.json', 'utf8'));
          const expected = process.env.PROJECT_ID;
          const actual = config?.extra?.eas?.projectId;
          if (actual !== expected) {
            throw new Error(`Expo config projectId mismatch: expected ${expected}, received ${actual ?? 'none'}.`);
          }
          console.log(`Verified Expo project ID: ${actual}`);
          NODE
          rm -f eas-init.log expo-config.json

      - name: Commit the generated project ID to a review branch
        id: commit
        env:
          PROJECT_ID: ${{ steps.current.outputs.project_id || steps.initialize.outputs.project_id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- eas-project.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No repository change is required."
            exit 0
          fi

          branch="chore/eas-project-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add eas-project.ts
          git commit -m "Link mobile app to EAS project"
          git push --set-upstream origin "$branch"

          body_file="$RUNNER_TEMP/eas-project-pr.md"
          cat > "$body_file" <<EOF
          ## Obiettivo

          Collega Sardinia FireWatch al progetto Expo EAS creato per l'account \`Camerun\`.

          ## Modifica

          - salva il project ID EAS \`$PROJECT_ID\`;
          - rende la configurazione riproducibile per build e submit;
          - non contiene credenziali o token;
          - non avvia ancora una build Apple.

          ## Verifica

          Il workflow ha confermato \`eas project:info\` e la configurazione pubblica Expo.
          EOF

          if gh pr create \
            --base main \
            --head "$branch" \
            --title "Link Sardinia FireWatch to its EAS project" \
            --body-file "$body_file"; then
            echo "Pull request created."
          else
            echo "::warning::The branch was pushed, but GitHub Actions could not open the pull request automatically."
            echo "Create it from: https://github.com/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Write the bootstrap summary
        env:
          PROJECT_ID: ${{ steps.current.outputs.project_id || steps.initialize.outputs.project_id }}
        shell: bash
        run: |
          {
            echo "## Sardinia FireWatch EAS bootstrap"
            echo
            echo "- Expo owner: \`Camerun\`"
            echo "- Project slug: \`sardinia-firewatch\`"
            echo "- EAS project ID: \`$PROJECT_ID\`"
            echo "- Dashboard: https://expo.dev/accounts/Camerun/projects/sardinia-firewatch"
            echo
            if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
              echo "A review branch was created with the generated project ID."
            else
              echo "The repository was already linked to this EAS project."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

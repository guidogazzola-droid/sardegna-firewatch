name: Bootstrap EAS project

on:
  workflow_dispatch:
  push:
    branches:
      - chore/run-eas-bootstrap-20260722
    paths:
      - ".github/workflows/eas-bootstrap.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: eas-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Create and link the Expo EAS project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Require the Expo token
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::The repository secret EXPO_TOKEN is missing."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Verify Expo account
        shell: bash
        run: |
          identity="$(eas whoami | head -n 1 | tr -d '\r')"
          account="$(printf '%s\n' "$identity" | sed 's/ (authenticated using EXPO_TOKEN)$//')"
          normalized="$(printf '%s' "$account" | tr '[:upper:]' '[:lower:]')"
          echo "Authenticated with Expo as: $account"
          if [ "$normalized" != "camerun" ]; then
            echo "::error::EXPO_TOKEN belongs to '$account', but this app is configured for Expo owner 'camerun'."
            exit 1
          fi

      - name: Create or find the EAS project
        id: initialize
        shell: bash
        run: |
          set +e
          eas project:init --non-interactive --force 2>&1 | tee eas-init.log
          init_status=${PIPESTATUS[0]}
          set -e

          project_id="$(node - <<'NODE'
          const fs = require('node:fs');
          const text = fs
            .readFileSync('eas-init.log', 'utf8')
            .replace(/\u001B\[[0-?]*[ -/]*[@-~]/g, '');
          const explicit = text.match(/projectId["']?\s*:\s*["']([0-9a-f-]{36})["']/i);
          const fallback = text.match(/[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i);
          process.stdout.write(explicit?.[1] ?? fallback?.[0] ?? '');
          NODE
          )"

          if [ -z "$project_id" ]; then
            echo "::error::EAS project initialization did not return a project ID (exit status: $init_status)."
            exit 1
          fi

          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"
          echo "EAS project created or found: $project_id"

      - name: Upload EAS bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-bootstrap-diagnostics-${{ github.run_id }}
          path: mobile/eas-init.log
          if-no-files-found: warn
          retention-days: 3

      - name: Save and verify the EAS project ID
        env:
          PROJECT_ID: ${{ steps.initialize.outputs.project_id }}
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const projectId = process.env.PROJECT_ID;
          if (!projectId) throw new Error('PROJECT_ID is missing.');
          fs.writeFileSync('eas-project.json', `${JSON.stringify({ projectId }, null, 2)}\n`);
          NODE

          eas project:init --id "$PROJECT_ID" --force --non-interactive
          eas project:info
          npx expo config --type public --json > expo-config.json

          node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('expo-config.json', 'utf8'));
          const expected = process.env.PROJECT_ID;
          const actual = config?.extra?.eas?.projectId;
          if (actual !== expected) {
            throw new Error(`Expo config projectId mismatch: expected ${expected}, received ${actual ?? 'none'}.`);
          }
          console.log(`Verified Expo project ID: ${actual}`);
          NODE

      - name: Publish the project ID to a deterministic review branch
        env:
          PROJECT_ID: ${{ steps.initialize.outputs.project_id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="chore/eas-project-result"
          git fetch origin "$branch"
          git checkout -B "$branch" "origin/$branch"

          node - <<'NODE'
          const fs = require('node:fs');
          const projectId = process.env.PROJECT_ID;
          if (!projectId) throw new Error('PROJECT_ID is missing.');
          fs.writeFileSync('eas-project.json', `${JSON.stringify({ projectId }, null, 2)}\n`);
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eas-project.json

          if git diff --cached --quiet; then
            echo "The review branch already contains the EAS project ID."
          else
            git commit -m "Link mobile app to EAS project"
            git push origin "$branch"
          fi

          if ! gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Link Sardinia FireWatch to its EAS project" \
              --body "Stores the public EAS project ID generated for @camerun/sardinia-firewatch. No credentials or Apple build artifacts are included."
          fi

      - name: Write the bootstrap summary
        env:
          PROJECT_ID: ${{ steps.initialize.outputs.project_id }}
        shell: bash
        run: |
          {
            echo "## Sardinia FireWatch EAS bootstrap"
            echo
            echo "- Expo owner: \`camerun\`"
            echo "- Project slug: \`sardinia-firewatch\`"
            echo "- EAS project ID: \`$PROJECT_ID\`"
            echo "- Dashboard: https://expo.dev/accounts/camerun/projects/sardinia-firewatch"
          } >> "$GITHUB_STEP_SUMMARY"

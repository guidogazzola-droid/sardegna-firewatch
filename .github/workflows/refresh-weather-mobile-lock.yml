name: Refresh weather mobile lockfile

on:
  push:
    branches:
      - feature/ios-weather-layers
    paths:
      - "mobile/package.json"
      - ".github/workflows/refresh-weather-mobile-lock.yml"

permissions:
  contents: write

concurrency:
  group: refresh-weather-mobile-lock
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out weather branch
        uses: actions/checkout@v5
        with:
          ref: feature/ios-weather-layers

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Refresh package lock
        working-directory: mobile
        run: npm install --package-lock-only --include=dev --no-audit --no-fund

      - name: Verify locked install
        working-directory: mobile
        run: npm ci --include=dev --no-audit --no-fund

      - name: Commit refreshed lockfile
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- mobile/package-lock.json)" ]; then
            echo "The mobile lockfile is already current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add mobile/package-lock.json
            git commit -m "Refresh mobile lockfile for weather layers"
            git push origin HEAD:feature/ios-weather-layers
          fi

      - name: Type-check
        working-directory: mobile
        run: npm run typecheck

      - name: Capture Expo dependency check
        id: expo_check
        working-directory: mobile
        shell: bash
        run: |
          set +e
          npx expo install --check > expo-install-check.log 2>&1
          status=$?
          set -e
          cat expo-install-check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Expo Doctor
        working-directory: mobile
        run: npm run doctor

      - name: Resolve Expo config
        working-directory: mobile
        run: npx expo config --type public

      - name: Bundle iOS JavaScript
        working-directory: mobile
        run: npx expo export --platform ios --output-dir dist-weather-ci

      - name: Upload Expo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-expo-check-${{ github.run_id }}
          path: mobile/expo-install-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Report Expo dependency result
        if: steps.expo_check.outputs.status != '0'
        working-directory: mobile
        run: |
          cat expo-install-check.log
          exit 1

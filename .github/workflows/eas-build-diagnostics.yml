name: Inspect failed EAS build

on:
  push:
    branches:
      - diagnostics/eas-build-8ef68970
    paths:
      - ".github/workflows/eas-build-diagnostics.yml"
  pull_request:
    paths:
      - ".github/workflows/eas-build-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Require Expo token
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN is not available to GitHub Actions."
            exit 1
          fi

      - name: Capture EAS CLI diagnostics
        working-directory: mobile
        shell: bash
        run: |
          output="$RUNNER_TEMP/eas-build-logs"
          mkdir -p "$output"

          npx --yes eas-cli@latest --version > "$output/eas-version.txt" 2>&1 || true
          npx --yes eas-cli@latest whoami > "$output/whoami.txt" 2>&1 || true
          npx --yes eas-cli@latest project:info > "$output/project-info.txt" 2>&1 || true
          npx --yes eas-cli@latest build:view --help > "$output/build-view-help.txt" 2>&1 || true

          set +e
          EXPO_DEBUG=1 EAS_DEBUG=1 npx --yes eas-cli@latest build:view \
            8ef68970-12e5-4d27-8e34-720da16878f5 --json \
            > "$output/build-view.stdout" \
            2> "$output/build-view.stderr"
          status=$?
          set -e
          printf '%s\n' "$status" > "$output/build-view.exit-status.txt"
          echo "build:view exit status: $status"

      - name: Download log resources from build metadata
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const outputDir = path.join(process.env.RUNNER_TEMP, 'eas-build-logs');
          const source = path.join(outputDir, 'build-view.stdout');
          if (!fs.existsSync(source)) process.exit(0);

          const raw = fs.readFileSync(source, 'utf8').trim();
          if (!raw) process.exit(0);

          let data;
          try {
            data = JSON.parse(raw);
          } catch (error) {
            fs.writeFileSync(path.join(outputDir, 'json-parse-error.txt'), String(error));
            process.exit(0);
          }

          const urls = [];
          function walk(value, trail = []) {
            if (typeof value === 'string' && /^https:\/\//.test(value)) {
              const label = trail.join('.').toLowerCase();
              if (label.includes('log')) urls.push({ label: trail.join('.'), url: value });
              return;
            }
            if (Array.isArray(value)) {
              value.forEach((entry, index) => walk(entry, [...trail, String(index)]));
              return;
            }
            if (value && typeof value === 'object') {
              Object.entries(value).forEach(([key, entry]) => walk(entry, [...trail, key]));
            }
          }

          walk(data);
          fs.writeFileSync(
            path.join(outputDir, 'summary.json'),
            JSON.stringify({
              id: data.id ?? null,
              status: data.status ?? null,
              error: data.error ?? null,
              platform: data.platform ?? null,
              profile: data.buildProfile ?? data.profile ?? null,
              topLevelKeys: Object.keys(data),
              logUrlCount: urls.length,
              logUrlLabels: urls.map((item) => item.label),
            }, null, 2),
          );

          Promise.all(urls.map(async ({ label, url }, index) => {
            const response = await fetch(url);
            const text = await response.text();
            const safeLabel = label.replace(/[^a-z0-9_.-]+/gi, '_');
            fs.writeFileSync(
              path.join(outputDir, `${String(index + 1).padStart(2, '0')}-${safeLabel}.log`),
              text,
            );
          })).then(() => {
            console.log(`Downloaded ${urls.length} log resource(s).`);
          }).catch((error) => {
            fs.writeFileSync(path.join(outputDir, 'log-download-error.txt'), String(error));
          });
          NODE

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-8ef68970-diagnostics
          path: ${{ runner.temp }}/eas-build-logs
          if-no-files-found: error
          retention-days: 3

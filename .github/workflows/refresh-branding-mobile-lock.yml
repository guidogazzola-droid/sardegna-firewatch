name: Refresh Sabetta Piro mobile lockfile

on:
  push:
    branches:
      - chore/sabetta-piro-branding-v2
    paths:
      - "mobile/package.json"
      - ".github/workflows/refresh-branding-mobile-lock.yml"

permissions:
  contents: write

concurrency:
  group: refresh-sabetta-piro-mobile-lock
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branding branch
        uses: actions/checkout@v5
        with:
          ref: chore/sabetta-piro-branding-v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Refresh package lock
        working-directory: mobile
        run: npm install --package-lock-only --include=dev --no-audit --no-fund

      - name: Verify locked install
        working-directory: mobile
        run: npm ci --include=dev --no-audit --no-fund

      - name: Commit refreshed lockfile
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- mobile/package-lock.json)" ]; then
            echo "The mobile lockfile is already current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add mobile/package-lock.json
            git commit -m "Refresh mobile lockfile for Sabetta Piro 0.2.0"
            git push origin HEAD:chore/sabetta-piro-branding-v2
          fi

      - name: Verify mobile project
        working-directory: mobile
        run: |
          npm run typecheck
          npx expo install --check
          npm run doctor
          npx expo config --type public
          npx expo export --platform ios --output-dir dist-branding-ci

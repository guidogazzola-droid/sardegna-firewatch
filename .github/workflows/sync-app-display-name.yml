name: Sync renamed app display name

on:
  push:
    branches:
      - feature/ios-weather-layers
    paths:
      - ".github/workflows/sync-app-display-name.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out weather branch
        uses: actions/checkout@v5
        with:
          ref: feature/ios-weather-layers

      - name: Replace hard-coded map title
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("mobile/app/(tabs)/index.tsx")
          text = path.read_text()
          old_import = '''import {
            SARDINIA_BOUNDS,
            SARDINIA_CENTER,
            SARDINIA_INITIAL_ZOOM,
          } from "../../src/lib/config";'''
          new_import = '''import {
            APP_DISPLAY_NAME,
            SARDINIA_BOUNDS,
            SARDINIA_CENTER,
            SARDINIA_INITIAL_ZOOM,
          } from "../../src/lib/config";'''
          old_title = '''<Text style={[styles.title, { color: theme.text }]}>Sardinia FireWatch</Text>'''
          new_title = '''<Text style={[styles.title, { color: theme.text }]}>{APP_DISPLAY_NAME}</Text>'''

          if old_import not in text:
            raise SystemExit("Expected config import was not found")
          if old_title not in text:
            raise SystemExit("Expected hard-coded app title was not found")

          text = text.replace(old_import, new_import, 1).replace(old_title, new_title, 1)
          path.write_text(text)
          PY

      - name: Commit UI branding sync
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'mobile/app/(tabs)/index.tsx'
          git commit -m "Use the configured app name in the map header"
          git push origin HEAD:feature/ios-weather-layers

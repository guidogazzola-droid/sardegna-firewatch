name: Generate mobile dependency lockfile

on:
  push:
    branches:
      - fix/ios-install-dependencies
    paths:
      - "mobile/package.json"
      - ".github/workflows/generate-mobile-lock.yml"
  pull_request:
    paths:
      - "mobile/package.json"
      - "mobile/package-lock.json"
      - ".github/workflows/generate-mobile-lock.yml"

permissions:
  contents: write

concurrency:
  group: mobile-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the repair branch
        uses: actions/checkout@v5
        with:
          ref: fix/ios-install-dependencies

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Generate a clean npm lockfile
        working-directory: mobile
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --include=dev --no-audit --no-fund

      - name: Verify the same clean install used by EAS Build
        id: clean_install
        working-directory: mobile
        shell: bash
        run: |
          set +e
          npm ci --include=dev --no-audit --no-fund > npm-ci.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat npm-ci.log
          exit 0

      - name: Upload lockfile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-lockfile-${{ github.run_id }}
          path: |
            mobile/package-lock.json
            mobile/npm-ci.log
          if-no-files-found: error
          retention-days: 3

      - name: Run mobile checks
        if: steps.clean_install.outputs.status == '0'
        working-directory: mobile
        run: |
          npm run typecheck
          npm run doctor
          npx expo config --type public
          npx expo export --platform ios --output-dir dist-lock-ci

      - name: Commit the lockfile
        if: steps.clean_install.outputs.status == '0'
        shell: bash
        run: |
          if git diff --quiet -- mobile/package-lock.json; then
            echo "The lockfile is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/package-lock.json
          git commit -m "Lock mobile dependencies for reproducible EAS builds"
          git push origin HEAD:fix/ios-install-dependencies

      - name: Fail if the clean install failed
        if: steps.clean_install.outputs.status != '0'
        working-directory: mobile
        run: |
          cat npm-ci.log
          exit 1

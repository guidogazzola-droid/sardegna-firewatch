name: Verify iOS foundation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-typecheck-${{ github.run_id }}
          path: mobile/typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Resolve public Expo config
        run: npx expo config --type public

      - name: Fail when TypeScript has errors
        if: steps.typecheck.outputs.status != '0'
        run: |
          cat typecheck.log
          exit 1

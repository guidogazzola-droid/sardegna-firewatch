name: Verify iOS foundation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install locked dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Check Expo dependency versions
        run: npx expo install --check

      - name: Check Expo dependencies and configuration
        run: npm run doctor

      - name: Resolve public Expo config
        run: npx expo config --type public

      - name: Bundle the iOS JavaScript application
        run: npx expo export --platform ios --output-dir dist-ci
